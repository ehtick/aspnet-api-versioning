name: Rebase PR

# ✅ Requires: Maintainers are allowed to edit this pull request

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number to rebase"
        required: true
        type: number

jobs:
  rebase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch PR branch
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          PR_BRANCH="pr-${PR_NUMBER}"

          git fetch origin pull/${PR_NUMBER}/head:${PR_BRANCH}

      - name: Rebase PR branch onto default branch
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          PR_BRANCH="pr-${PR_NUMBER}"

          git checkout ${PR_BRANCH}
          git rebase origin/${{ github.event.repository.default_branch }}

      - name: Push updated branch back to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          PR_BRANCH="pr-${PR_NUMBER}"

          git push --force-with-lease origin ${PR_BRANCH}
